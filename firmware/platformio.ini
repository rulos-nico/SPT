; PlatformIO configuration for SPT measurement system
; Target: ESP32 DevKit (can be adapted to Arduino Mega/Uno with minor changes)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit ADXL345@^1.3.2
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/RTClib@^2.1.1
    bblanchon/ArduinoJson@^6.21.3
    SPI
    SD

[env:arduino_mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit ADXL345@^1.3.2
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/RTClib@^2.1.1
    bblanchon/ArduinoJson@^6.21.3
    SPI
    SD
